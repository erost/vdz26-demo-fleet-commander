apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: numbers.platform.org
spec:
  scope: Namespaced
  group: platform.org
  names:
    kind: Number
    plural: numbers
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                value:
                  type: string
                  description: The number value to provision on unit-numbers.
